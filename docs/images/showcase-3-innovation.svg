<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-label="Innovation Track: brand-driven liquid-metal jewelry storefront">
  <defs>
    <radialGradient id="metalGlow" cx="38%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E8E3D8"/>
      <stop offset="55%" stop-color="#9A9388"/>
      <stop offset="100%" stop-color="#2B2823"/>
    </radialGradient>
    <radialGradient id="warmSpot" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#4A3E2E" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#14110D"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="#14110D"/>
  <rect width="800" height="500" fill="url(#warmSpot)"/>
  <!-- sculptural product hero with metallic depth -->
  <ellipse cx="300" cy="270" rx="150" ry="170" fill="url(#metalGlow)"/>
  <ellipse cx="268" cy="232" rx="90" ry="100" fill="#D9D2C5" opacity="0.45"/>
  <ellipse cx="326" cy="300" rx="60" ry="66" fill="#5C564D" opacity="0.6"/>
  <!-- rim highlight -->
  <path d="M 168 250 Q 300 120 432 250" fill="none" stroke="#F4F1EA" stroke-width="2" opacity="0.5"/>
  <!-- editorial brand text, right side -->
  <text x="520" y="200" font-family="Georgia, serif" font-size="16" letter-spacing="4" fill="#B8AE9C">FORGED</text>
  <text x="520" y="240" font-family="Georgia, serif" font-size="38" fill="#E8E3D8">Hand-hammered</text>
  <text x="520" y="280" font-family="Georgia, serif" font-size="38" fill="#E8E3D8">signet ring.</text>
  <rect x="520" y="305" width="200" height="1" fill="#6B6358"/>
  <text x="520" y="332" font-family="Georgia, serif" font-size="14" fill="#9A9388" font-style="italic">Sterling silver, each piece unique.</text>
  <text x="520" y="372" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#14110D">
    <tspan dx="0" dy="0" fill="#E8E3D8">⠀</tspan>
  </text>
  <rect x="520" y="360" width="150" height="42" rx="1" fill="none" stroke="#E8E3D8" stroke-width="1"/>
  <text x="595" y="386" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#E8E3D8" letter-spacing="2">EXPLORE</text>
  <text x="210" y="465" font-family="Georgia, serif" font-size="13" fill="#6B6358" font-style="italic">dramatic · material depth · brand-driven</text>
  <text x="520" y="475" font-family="monospace" font-size="12" fill="#6B6358">showcase-3-innovation.svg</text>
</svg>
