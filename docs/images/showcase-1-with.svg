<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-label="With OJO Skills: brand-driven coffee app home screen with real imagery">
  <rect width="800" height="500" fill="#F5EFE6"/>
  <!-- warm brand atmosphere, no neon gradient -->
  <rect x="100" y="60" width="380" height="300" rx="6" fill="#3E2A1E"/>
  <!-- real coffee photo stand-in -->
  <circle cx="290" cy="200" r="70" fill="#6F4E37"/>
  <circle cx="265" cy="180" r="55" fill="#A9745B" opacity="0.6"/>
  <circle cx="315" cy="215" r="40" fill="#8B5E3C" opacity="0.5"/>
  <!-- editorial text, left-aligned, generous whitespace -->
  <text x="540" y="120" font-family="Georgia, serif" font-size="34" fill="#3E2A1E">Single-origin,</text>
  <text x="540" y="160" font-family="Georgia, serif" font-size="34" fill="#3E2A1E">roasted to order.</text>
  <rect x="540" y="200" width="220" height="14" rx="3" fill="#8B5E3C" opacity="0.5"/>
  <rect x="540" y="224" width="180" height="14" rx="3" fill="#8B5E3C" opacity="0.4"/>
  <rect x="540" y="270" width="150" height="44" rx="2" fill="#3E2A1E"/>
  <text x="615" y="298" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#F5EFE6" font-weight="600">Subscribe</text>
  <!-- provenance / roast date detail -->
  <text x="540" y="350" font-family="monospace" font-size="12" fill="#8B5E3C">ROASTED 2026.07.08 · ETHIOPIA YIRGACHEFFE</text>
  <text x="400" y="475" text-anchor="middle" font-family="monospace" font-size="12" fill="#8B5E3C" opacity="0.6">showcase-1-with.svg</text>
</svg>
