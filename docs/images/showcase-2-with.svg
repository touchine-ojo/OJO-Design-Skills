<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-label="With OJO Skills: atomic Tailwind classes with 8 interaction states">
  <rect width="800" height="500" fill="#0D1117"/>
  <!-- code-like token blocks representing atomic tailwind classes -->
  <rect x="40" y="50" width="720" height="34" rx="6" fill="#161B22"/>
  <text x="58" y="72" font-family="monospace" font-size="13" fill="#FF7B72">class=</text><text x="108" y="72" font-family="monospace" font-size="13" fill="#A5D6FF">"px-5 py-2.5 rounded-xl bg-emerald-600</text>
  <text x="58" y="92" font-family="monospace" font-size="13" fill="#A5D6FF">      text-white shadow-md hover:bg-emerald-500</text>
  <text x="58" y="112" font-family="monospace" font-size="13" fill="#A5D6FF">      active:scale-[0.98] focus:ring-2 ..."</text>
  <!-- 8-state chips -->
  <text x="40" y="160" font-family="monospace" font-size="13" fill="#8B949E">// 8 interaction states</text>
  <g font-family="monospace" font-size="12">
    <rect x="40" y="180" width="84" height="28" rx="6" fill="#1F6FEB"/><text x="82" y="198" text-anchor="middle" fill="#C9D1D9">Default</text>
    <rect x="132" y="180" width="84" height="28" rx="6" fill="#238636"/><text x="174" y="198" text-anchor="middle" fill="#C9D1D9">Hover</text>
    <rect x="224" y="180" width="84" height="28" rx="6" fill="#8957E5"/><text x="266" y="198" text-anchor="middle" fill="#C9D1D9">Active</text>
    <rect x="316" y="180" width="84" height="28" rx="6" fill="#1F6FEB"/><text x="358" y="198" text-anchor="middle" fill="#C9D1D9">Focus</text>
    <rect x="408" y="180" width="84" height="28" rx="6" fill="#484F58"/><text x="450" y="198" text-anchor="middle" fill="#C9D1D9">Disabled</text>
    <rect x="500" y="180" width="84" height="28" rx="6" fill="#8B949E"/><text x="542" y="198" text-anchor="middle" fill="#0D1117">Loading</text>
    <rect x="592" y="180" width="84" height="28" rx="6" fill="#238636"/><text x="634" y="198" text-anchor="middle" fill="#C9D1D9">Success</text>
    <rect x="684" y="180" width="76" height="28" rx="6" fill="#DA3633"/><text x="722" y="198" text-anchor="middle" fill="#C9D1D9">Error</text>
  </g>
  <!-- spring physics annotation -->
  <text x="40" y="260" font-family="monospace" font-size="13" fill="#8B949E">// motion — spring physics</text>
  <rect x="40" y="278" width="720" height="60" rx="6" fill="#161B22"/>
  <text x="58" y="302" font-family="monospace" font-size="12" fill="#79C0FF">press:</text><text x="110" y="302" font-family="monospace" font-size="12" fill="#FFA657">{ scale: 0.98, stiffness: 400, damping: 10 }</text>
  <text x="58" y="324" font-family="monospace" font-size="12" fill="#79C0FF">hover:</text><text x="110" y="324" font-family="monospace" font-size="12" fill="#FFA657">{ y: -2,   stiffness: 300, damping: 15 }</text>
  <!-- checkmark list -->
  <text x="40" y="378" font-family="monospace" font-size="13" fill="#7EE787">✓ atomic Tailwind strings   ✓ all 8 states   ✓ spring physics</text>
  <text x="400" y="470" text-anchor="middle" font-family="monospace" font-size="12" fill="#484F58">showcase-2-with.svg</text>
</svg>
